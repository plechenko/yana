name: YANA CI
on:
  push:
    branches:
      - main
    tags: ["v*.*.*"]
  pull_request:
    branches:
      - main
permissions:
  contents: write
jobs:
  tests:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run YANA tests (bash)
        shell: bash
        run: ./yana_tests.sh
      - name: Run YANA tests (pwsh)
        shell: pwsh
        run: ./yana_tests.ps1
  release:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v7
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          fail_on_unmatched_files: false
          generate_release_notes: true
          files: |
            yana_tests.sh
            yana_tests.ps1
