name: YANA CI
on:
  push:
    branches:
      - main
    tags: ["v*.*.*"]
  pull_request:
    branches:
      - main
permissions:
  contents: write
jobs:
  tests:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run YANA tests (bash)
        shell: bash
        run: ./yana-test.sh
      - name: Run YANA tests (pwsh)
        shell: pwsh
        run: ./yana-test.ps1
  release:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v7
      - name: Set Version in YANA scripts
        shell: bash
        run: |
          VERSION="${GITHUB_REF#v}"
          for file in yana-test.sh yana-test.ps1 yana.sh yana.ps1; do
            [[ -f "$file" ]] || continue
            echo "Setting version to '${VERSION}' in $file"
            sed -i "s/YANAVERSIONPLACEHOLDER/${VERSION}/g" "$file"
          done
        env:
          GITHUB_REF: ${{ github.ref_name }}
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          fail_on_unmatched_files: false
          generate_release_notes: true
          files: |
            yana.sh
            yana.ps1
            yana-test.sh
            yana-test.ps1
